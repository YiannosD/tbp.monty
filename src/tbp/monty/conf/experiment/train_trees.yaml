# @package _global_

# Data setup: download tree meshes (.glb) into $MONTY_DATA/Trees/
#   wget https://github.com/YiannosD/tbp.monty/releases/download/trees-data-v1/trees.tgz
#   tar xzf trees.tgz -C ~/tbp/data/

defaults:
  - /monty: evidencegraph_exp1000_e3_t3_tot2500
  - /monty/motor_system_config: informed_5_goal0
  - /monty/learning_module: evidence_1lm_nn5
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /environment: mesh_trees
  - /env_interface: train_trees_random
  - /env_interface/positioning_procedures_train: getgoodview_viewfinder_patch_trees
  - /logging: silent_warning_train

experiment:
  _target_: tbp.monty.frameworks.experiments.tolerant_episode_experiment.TolerantEpisodeExperiment
  config:
    show_sensor_output: false
    do_eval: false
    seed: 42
    n_train_epochs: 10
    n_eval_epochs: 0
    max_train_steps: 5000
    max_eval_steps: 500
    max_total_steps: 10000
    model_name_or_path: ""
    min_lms_match: 1
    supervised_lm_ids: []
    logging:
      python_log_level: INFO
      output_dir: ${path.expanduser:${oc.env:MONTY_LOGS}/tree_unsupervised}
      run_name: train_trees_unsupervised
    monty_config:
      monty_args:
        num_exploratory_steps: 5000
        min_train_steps: 200
      learning_module_configs:
        learning_module_0:
          learning_module_args:
            # Trees are ~1m (unit bounding box) vs default 0.3m for YCB objects.
            # match_distance scaled proportionally: 0.01 for 0.3m -> 0.03 for 1m.
            max_graph_size: 1.5
            max_match_distance: 0.03
            object_evidence_threshold: 20
            x_percent_threshold: 50
