# @package experiment.config.environment

env_init_func: ${monty.class:tbp.monty.frameworks.environments.mesh_environment.MeshEnvironment}
env_init_args:
  data_path: ${path.expanduser:${oc.env:MONTY_DATA}/Trees}
  resolution:
  - 64
  - 64
  hfov: 90.0
  zoom: 1.0
  agent_position:
  - 0.0
  - 0.0
  - 1.0
  normalize_meshes: true
transform:
- _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
  agent_id: agent_id_0
  max_depth: 1
- _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
  agent_id: agent_id_0
  sensor_ids:
  - patch
  - view_finder
  resolutions:
  - - 64
    - 64
  - - 64
    - 64
  world_coord: true
  zooms:
  - 1.0
  - 1.0
  get_all_points: true
  use_semantic_sensor: false
